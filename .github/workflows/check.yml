name: stock-check

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC). GitHub may delay during high load.
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

# Allow the job to commit state.json back to the repo.
permissions:
  contents: write

# Don't pile up overlapping runs.
concurrency:
  group: stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run stock check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
        run: python check.py

      - name: Persist state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "stock-bot"
            git config user.email "stock-bot@users.noreply.github.com"
            git add state.json
            git commit -m "update stock state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
